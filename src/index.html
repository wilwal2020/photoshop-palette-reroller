<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #323232;
    --panel: #3c3c3c;
    --panel-hi: #474747;
    --line: #262626;
    --txt: #e3e3e3;
    --txt-dim: #9a9a9a;
    --accent: #4a90ff;
    --accent-hi: #5e9dff;
    --lock: #ffc23d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 12px;
    font-family: -apple-system, "Segoe UI", sans-serif;
    font-size: 11px;
    color: var(--txt);
    background: var(--bg);
    user-select: none;
    -webkit-user-select: none;
  }

  .title {
    font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase;
    color: var(--txt-dim); margin-bottom: 12px; font-weight: 600;
  }
  .title #version { letter-spacing: 0.5px; opacity: 0.7; font-weight: 400; }

  .controls { display: flex; gap: 8px; margin-bottom: 14px; }
  .controls .field { flex: 1; min-width: 0; }
  .label { color: var(--txt-dim); margin-bottom: 4px; font-size: 10px; }

  /* custom dropdown */
  .dd { position: relative; }
  .dd-head {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 5px; padding: 6px 9px; cursor: pointer; gap: 6px;
  }
  .dd-head:hover { background: var(--panel-hi); }
  .dd-head span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dd-head .caret { color: var(--txt-dim); flex: 0 0 auto; font-size: 9px; }
  .dd-list {
    display: none; position: absolute; left: 0; right: 0; top: calc(100% + 3px);
    background: var(--panel-hi); border: 1px solid var(--line);
    border-radius: 5px; z-index: 30; overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  .dd.open .dd-list { display: block; }
  .dd-item { padding: 6px 9px; cursor: pointer; }
  .dd-item:hover { background: var(--accent); color: #fff; }
  .dd-item.sel { color: var(--accent); font-weight: 600; }
  .dd-item.sel:hover { color: #fff; }

  /* checklist items */
  .dd-item.check { display: flex; align-items: center; gap: 8px; }
  .dd-item.check .box {
    flex: 0 0 auto; width: 13px; height: 13px; border-radius: 3px;
    border: 1px solid var(--txt-dim); position: relative; transition: all 0.12s;
  }
  .dd-item.check.on .box { background: var(--accent); border-color: var(--accent); }
  .dd-item.check.on .box::after {
    content: ""; position: absolute; left: 4px; top: 1px;
    width: 3px; height: 6px; border: solid #fff; border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .dd-item.check:hover { background: var(--panel); color: var(--txt); }
  .dd-item.check:hover .box { border-color: var(--txt); }

  .divider { height: 1px; background: var(--line); margin: 4px 0 12px; }

  /* swatches */
  .sw-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .sw-head .hint { color: var(--txt-dim); font-size: 10px; }
  #swatches { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
  .sw {
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; border-radius: 6px; padding: 4px;
    transition: background 0.12s;
  }
  .sw:hover { background: var(--panel); }
  .chip {
    width: 40px; height: 40px; border-radius: 7px; flex: 0 0 auto;
    position: relative; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.30);
    transition: box-shadow 0.12s;
  }
  .sw.locked .chip { box-shadow: inset 0 0 0 1px rgba(0,0,0,0.30), 0 0 0 2px var(--lock); }
  .meta { flex: 1; min-width: 0; }
  .hex { font-family: "SF Mono", "Consolas", monospace; letter-spacing: 0.6px; font-size: 12px; }
  .state { color: var(--txt-dim); font-size: 10px; margin-top: 2px; }
  .sw.locked .state { color: var(--lock); }

  /* link button + CSS chain icon */
  .link {
    flex: 0 0 auto; width: 26px; height: 26px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--txt-dim); background: var(--panel);
    border: 1px solid var(--line); transition: all 0.12s;
  }
  .link:hover { background: var(--panel-hi); color: var(--txt); }
  .link.on { color: var(--accent); border-color: var(--accent); }
  .link.armed { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  .chain { position: relative; width: 14px; height: 14px; color: inherit; }
  .chain::before, .chain::after {
    content: ""; position: absolute; width: 9px; height: 6px;
    border: 2px solid currentColor; border-radius: 4px;
    transform: rotate(-45deg);
  }
  .chain::before { top: 2px; left: 0px; }
  .chain::after  { top: 6px; left: 5px; }

  /* row states while linking */
  .sw.armed { background: var(--panel); }
  .sw.target .link { border-style: dashed; color: var(--accent); }

  /* CSS padlock badge, shown when locked */
  .lock {
    position: absolute; right: 4px; bottom: 4px;
    width: 12px; height: 9px; border-radius: 2px;
    background: var(--lock); display: none;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.45);
  }
  .lock::before {
    content: ""; position: absolute; left: 2.5px; top: -5px;
    width: 7px; height: 7px; border: 1.6px solid var(--lock);
    border-bottom: none; border-radius: 4px 4px 0 0;
  }
  .sw.locked .lock { display: block; }

  .placeholder { color: var(--txt-dim); line-height: 1.55; padding: 10px 2px; }

  /* generate button */
  .btnrow { display: flex; gap: 8px; }
  #generate {
    flex: 1; padding: 10px; border: none; border-radius: 6px;
    background: var(--accent); color: #fff; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background 0.12s;
  }
  #generate:hover { background: var(--accent-hi); }
  #generate:active { opacity: 0.85; }
  #swap {
    flex: 0 0 auto; padding: 10px 14px; border: 1px solid var(--line);
    border-radius: 6px; background: var(--panel); color: var(--txt);
    font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.12s;
  }
  #swap:hover { background: var(--panel-hi); }
  #swap:active { opacity: 0.85; }
  #status { color: var(--txt-dim); margin-top: 9px; min-height: 13px; font-size: 10px; }
</style>
</head>
<body>
  <div class="title">Palette Re-roller <span id="version"></span></div>

  <div class="controls">
    <div class="field">
      <div class="label">Harmony</div>
      <div id="harmonyDD"></div>
    </div>
    <div class="field">
      <div class="label">Style</div>
      <div id="styleDD"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="sw-head">
    <span class="label" style="margin:0">Swatches</span>
    <span class="hint">row = lock &middot; chain = link</span>
  </div>
  <div id="swatches">
    <div class="placeholder">Select your Solid Color fill layers, then hit Generate.</div>
  </div>

  <div class="btnrow">
    <button id="generate">Generate</button>
    <button id="swap" title="Reassign the current colours to different layers">Swap</button>
  </div>
  <div id="status"></div>

  <script src="main.js"></script>
</body>
</html>
